<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor de Unidades</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">
    <h1>Conversor de Unidades</h1>

    <form id="form-conversor">

      <div>
        <label for="entrada">Valor</label>
        <input 
          type="number" 
          id="entrada" 
          placeholder="Digite um número"
          required
        >
      </div>

      <div>
        <label for="tipo-conversao">Tipo de conversão</label>
        <select id="tipo-conversao">
          <option value="milhasParaKm">Milhas → Quilômetros</option>
          <option value="kmParaMilhas">Quilômetros → Milhas</option>
        </select>
      </div>

      <div>
        <button type="submit">Converter</button>
      </div>

    </form>

    <p>Resultado: <strong id="resultado">0</strong></p>

  </main>

  <script src="script.js"></script>
</body>
</html>
